type chats {
  chat_id: String!
  created_at: DateTime!
  updated_at: DateTime!
  other_user: users!
  last_message: messages

  unread_count: Int!
}

type messages {
  message_id: String!
  chat_id: String!
  sender_id: String!
  text_content: String
  sent_at: DateTime!
  updated_at: DateTime
  deleted_at: DateTime
  reply_to: messages
  reactions: [message_reactions!]!
  is_mine: Boolean!
}

type message_reactions {
  reaction_id: String!
  emoji: String!
  user_id: String!
  created_at: DateTime!

  is_mine: Boolean!
}

type MessagesResult {
  messages: [messages!]!
  nextCursor: DateTime
}

type SearchMessagesResult {
  messages: [messages!]!
  totalCount: Int!
  nextCursor: DateTime
}

input SendMessageInput {
  targetUserId: ID
  text: String!
  replyTo: ID
}

input AddReactionInput {
  messageId: ID!
  emoji: String!
}

extend type Query {
  myChats: [chats!]!
  chat(id: ID!): chats!
  chatMessages(chatId: ID!, cursor: DateTime, limit: Int): MessagesResult!
  searchChatMessages(chatId: ID!, search: String!, cursor: DateTime, limit: Int): SearchMessagesResult!
}

extend type Mutation {
  deleteChat(chatId: ID!): Boolean!

  sendMessage(input: SendMessageInput!): messages!
  updateMessage(messageId: ID!, text: String!): messages!
  deleteMessage(messageId: ID!): Boolean!

  addReaction(input: AddReactionInput!): message_reactions!
  removeReaction(messageId: ID!): Boolean!
}

extend type Subscription {
  messageSent(chatId: ID!): messages!
  messageUpdated(chatId: ID!): messages!
  reactionAdded(chatId: ID!): message_reactions!
}