# Chat
type chats {
  chat_id: String!
  title: String
  is_group_chat: Boolean!
  created_at: DateTime!
  chat_participants: [chat_participants]!
  messages: [messages]!
}

input chatsCreateInput {
  title: String
  is_group_chat: Boolean!
  chatParticipants: [chat_participantsCreateInput!]
}

input chatsUpdateInput {
  chat_id: String!
  title: String
  is_group_chat: Boolean
}

# Participant
type chat_participants {
  id: BigInt!
  joined_at: DateTime!
  user: users
  chat: chats!
}

input chat_participantsCreateInput {
  chat_id: String!
}

# Message
type messages {
  message_id: String!
  text_content: String
  sent_at: DateTime!
  chat: chats!
  user: users
}

input messagesCreateInput {
  chat_id: String!
  text_content: String
}

input messagesUpdateInput {
  message_id: String!
  text_content: String
}

#################################
extend type Query {
  myChats: [chats!]!
  chat(id: ID!): chats
  chatMessages(chatId: ID!, cursor: DateTime, limit: Int): MessagesResult!
}

type MessagesResult {
  messages: [messages!]!
  nextCursor: DateTime
}

extend type Mutation {
  # Chat mutations
  createDirectChat(userId: ID!): chats!
  createGroupChat(title: String, participantIds: [ID!]!): chats!
  updateChat(data: chatsUpdateInput!): chats!
  deleteChat(chatId: ID!): Boolean!
  
  # Participant mutations
  addChatParticipants(chatId: ID!, userIds: [ID!]!): chat_participants!
  removeChatParticipant(chatId: ID!, userId: ID!): Boolean!
  leaveChat(chatId: ID!): Boolean!
  
  # Message mutations
  sendMessage(chatId: ID!, text: String!): messages!
  updateMessage(data: messagesUpdateInput!): messages!
  deleteMessage(messageId: ID!): Boolean!
}